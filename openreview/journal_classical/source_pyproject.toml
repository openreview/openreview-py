[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "jmlr-openreview-configuration"
version = "0.1.0"
description = "Reviewable JMLR OpenReview venue configuration source and public checks."
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
test = [
  "pytest>=8,<9",
]

[tool.setuptools]
packages = []

[tool.pytest.ini_options]
testpaths = ["tests/source"]
python_files = ["test_*.py"]
addopts = "-q"
